<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Vault | Sign In</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:radial-gradient(circle at top,#16325d 0%,#08111f 45%,#03070d 100%);
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    background:#2563eb;
    opacity:.15;
    filter:blur(180px);
    animation:pulse 6s infinite alternate;
}

@keyframes pulse{
    from{transform:scale(.9);}
    to{transform:scale(1.2);}
}

.card{
    position:relative;
    width:420px;
    padding:35px;
    border-radius:20px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 0 40px rgba(37,99,235,.35);
    color:white;
    z-index:2;
}

.logo{
    font-size:60px;
    text-align:center;
    margin-bottom:10px;
}

h2{
    text-align:center;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#b6c5df;
    margin-bottom:25px;
    font-size:14px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.05);
    color:white;
    outline:none;
    font-size:15px;
}

input::placeholder{
    color:#bfc7d6;
}

input:focus{
    border-color:#3b82f6;
    box-shadow:0 0 12px rgba(59,130,246,.4);
}

.password-box{
    position:relative;
}

.password-box input{
    padding-right:50px;
}

.toggle{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#9ca3af;
    user-select:none;
}

button{
    width:100%;
    padding:14px;
    margin-top:18px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#3b82f6;
}

.loading{
    display:none;
    text-align:center;
    margin-top:20px;
}

.spinner{
    width:42px;
    height:42px;
    margin:15px auto;
    border:4px solid rgba(255,255,255,.2);
    border-top:4px solid #3b82f6;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.status{
    color:#9fd4ff;
    font-size:14px;
}

.security{
    text-align:center;
    color:#86efac;
    margin-top:25px;
    font-size:13px;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#cbd5e1;
}

.footer a{
    color:#60a5fa;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">🔓</div>

<h2>Unlock Digital Vault</h2>

<p class="subtitle">
Authenticate to access your encrypted vault.
</p>

<form id="loginForm">

<input type="email" placeholder="Email Address" required>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Master Password"
required>

<span class="toggle" onclick="togglePassword()">👁</span>

</div>

<button type="submit">
Unlock Vault
</button>

</form>

<div class="loading" id="loading">

<div class="spinner"></div>

<p class="status" id="status">
Authenticating...
</p>

</div>

<div class="security">
🟢 Secure Session • AES-256 Encryption
</div>

<div class="footer">
Need a vault?
<a href="signup.html">Create One</a>
</div>

</div>

<script>

function togglePassword(){

const password=document.getElementById("password");

password.type=password.type==="password"
?"text"
:"password";

}

const form=document.getElementById("loginForm");
const loading=document.getElementById("loading");
const status=document.getElementById("status");

const steps=[
"Connecting to Secure Gateway...",
"Verifying Identity...",
"Decrypting Vault...",
"Loading Secure Files...",
"Granting Access..."
];

form.addEventListener("submit",function(e){

e.preventDefault();

form.style.display="none";
loading.style.display="block";

let i=0;

status.innerHTML=steps[0];

const process=setInterval(()=>{

i++;

if(i<steps.length){

status.innerHTML=steps[i];

}else{

clearInterval(process);

loading.innerHTML=`
<h2 style="color:#22c55e;">
✔ Access Granted
</h2>

<br>

<p style="color:#d1d5db;">
Welcome back.
Your Digital Vault is now unlocked.
</p>

<p style="margin-top:15px;color:#60a5fa;">
Redirecting...
</p>
`;

setTimeout(()=>{

window.location.href="dashboard.html";

},2500);

}

},1200);

});

</script>

</body>
</html>
